<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #334155;
        }
        .navbar-brand { font-weight: 700; color: #0f172a; }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .stat-card {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            color: white;
        }
        .table thead {
            background-color: #f1f5f9;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        .btn-primary {
            background-color: #4f46e5;
            border: none;
            padding: 10px 20px;
            font-weight: 600;
        }
        .btn-primary:hover { background-color: #4338ca; }
        #expenseChart { max-height: 280px; }
        .table-scroll {
            max-height: 400px;
            overflow-y: auto;
            border-bottom: 1px solid #e2e8f0;
        }
        .table-scroll table thead th {
            position: sticky;
            top: 0;
            background-color: #f1f5f9;
            z-index: 1;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">💰 Finance Tracker</a>
        <div class="ms-auto">
            <span class="text-muted me-3">Tuong Do</span>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card stat-card p-4 mb-4">
                <div class="row align-items-center">
                    <div class="col-8">
                        <h6 class="text-white-50 mb-1">Total Spending</h6>
                        <h2 class="fw-bold mb-0" id="total-amount">$0.00</h2>
                    </div>
                    <div class="col-4 text-end">
                        <div class="bg-white bg-opacity-25 rounded-circle d-inline-block p-3">
                            💸
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-4">
                <h6 class="fw-bold mb-4 text-uppercase small">Spending Distribution</h6>
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card p-4 h-100">
                <h6 class="fw-bold mb-4 text-uppercase small text-primary">Add New Transaction</h6>
                <form id="expense-form">
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Category</label>
                        <select id="category" class="form-select border-0 bg-light">
                            <option value="Groceries">🍎 Groceries</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Utilities">⚡ Utilities</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Amount ($)</label>
                        <input type="number" id="amount" class="form-control border-0 bg-light" placeholder="0.00" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Description</label>
                        <input type="text" id="description" class="form-control border-0 bg-light" placeholder="What was this for?" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-medium">Date</label>
                        <input type="date" id="date" class="form-control border-0 bg-light" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 shadow-sm">Save Transaction</button>
                </form>
            </div>
        </div>

        <div class="col-12 mt-4">
            <div class="card p-4 mb-5">
                <h6 class="fw-bold mb-4 text-uppercase small">Transaction History</h6>
                <div class="table-responsive table-scroll">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th class="border-0">Date</th>
                                <th class="border-0">Category</th>
                                <th class="border-0">Description</th>
                                <th class="border-0 text-end">Amount</th>
                                <th class="border-0 text-end">Action</th> </tr>
                            </tr>
                        </thead>
                        <tbody id="expense-list" class="border-top-0">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let myChart;

    async function fetchData() {
        try {
            const response = await fetch('/api/expenses');
            const data = await response.json();
            updateUI(data);
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    function updateUI(expenses) {
        const list = document.getElementById('expense-list');
        list.innerHTML = '';
        let total = 0;
        const catTotals = {};

        expenses.forEach(exp => {
            total += exp.amount;
            catTotals[exp.category] = (catTotals[exp.category] || 0) + exp.amount;
            
            list.innerHTML += `
                <tr>
                    <td class="text-muted small">${exp.date}</td>
                    <td><span class="badge bg-light text-dark border">${exp.category}</span></td>
                    <td class="fw-medium">${exp.description}</td>
                    <td class="text-end fw-bold text-dark">$${exp.amount.toFixed(2)}</td>
                    <td class="text-end">
                    <button onclick="deleteExpense(${exp.id})" class="btn btn-sm btn-outline-danger border-0">
                        🗑️
                    </button>
                </td>
                </tr>
            `;
        });

        document.getElementById('total-amount').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        renderChart(catTotals);
    }

    function renderChart(catTotals) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: Object.keys(catTotals),
                datasets: [{
                    data: Object.values(catTotals),
                    backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444'],
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                plugins: {
                    legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
                }
            }
        });
    }

    document.getElementById('expense-form').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            category: document.getElementById('category').value,
            amount: parseFloat(document.getElementById('amount').value),
            description: document.getElementById('description').value,
            date: document.getElementById('date').value
        };
        await fetch('/api/expenses', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        fetchData();
        e.target.reset();
    };

    async function deleteExpense(id) {
        if (confirm("Bạn có chắc chắn muốn xóa giao dịch này không?")) {
            try {
                const response = await fetch(`/api/expenses/${id}`, {
                    method: 'DELETE',
                });
                if (response.ok) {
                    fetchData();
                } else {
                    alert("Lỗi khi xóa giao dịch");
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }
    }

    fetchData();
</script>
</body>
</html>
